<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Victor FF</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
    overflow: hidden;

    /* 🔥 força escala maior */
    zoom: 1.3;
}

/* fundo */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}

/* menu */
.menu {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 95%;
    max-width: 380px;

    padding: 20px;
    background: rgba(0,0,0,0.95);
    border: 2px solid red;
    border-radius: 12px;
    box-shadow: 0 0 30px red;
}

/* título */
.menu h2 {
    text-align: center;
    color: red;
    font-size: 26px;
}

/* linhas */
.row {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    font-size: 18px;
}

/* inputs */
input[type="checkbox"] {
    width: 22px;
    height: 22px;
}

input[type="range"] {
    width: 100%;
}

select {
    width: 100%;
    padding: 8px;
    background: black;
    color: white;
    border: 1px solid red;
    font-size: 16px;
}

/* rádio */
.radio {
    display: flex;
    align-items: center;
    margin: 10px 0;
    cursor: pointer;
    font-size: 17px;
}

.radio-circle {
    width: 18px;
    height: 18px;
    border: 2px solid red;
    border-radius: 50%;
    margin-right: 10px;
}

.radio.active .radio-circle {
    background: red;
}

/* botão */
.btn {
    margin-top: 20px;
    width: 100%;
    padding: 18px;
    background: red;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 20px red;
    font-size: 18px;
}

/* loading */
#loading {
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:black;
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:999;
}

.barBox {
    width:260px;
    height:14px;
    border:1px solid red;
    margin-top:10px;
}

.bar {
    height:100%;
    width:0;
    background:red;
}
</style>

</head>
<body>

<canvas id="matrix"></canvas>

<div class="menu">
    <h2>Victor FF</h2>

    <div class="row">
        <span>Aimbot</span>
        <input type="checkbox">
    </div>

    <div class="row">
        <span>No Recoil</span>
        <input type="checkbox">
    </div>

    <div class="row">
        <span>Aim Lock</span>
        <input type="checkbox">
    </div>

    <div>
        <span>Aim FOV</span>
        <input type="range">
    </div>

    <div>
        <span>Precisão</span>
        <input type="range">
    </div>

    <div>
        <select>
            <option>Cabeça</option>
            <option>Pescoço</option>
        </select>
    </div>

    <div class="radio" onclick="selectRadio(this)">
        <div class="radio-circle"></div>
        <span>Aimbot ao atirar</span>
    </div>

    <div class="radio" onclick="selectRadio(this)">
        <div class="radio-circle"></div>
        <span>Aimbot ao olhar</span>
    </div>

    <button class="btn" onclick="inject()">INJETAR</button>
</div>

<div id="loading">
    <h2 style="color:red;">INJETANDO...</h2>

    <div class="barBox">
        <div id="bar" class="bar"></div>
    </div>

    <p id="status">0%</p>
</div>

<script>
function selectRadio(el){
    document.querySelectorAll(".radio").forEach(r=>r.classList.remove("active"));
    el.classList.add("active");
}

function inject(){
    const loading = document.getElementById("loading");
    const bar = document.getElementById("bar");
    const status = document.getElementById("status");

    loading.style.display = "flex";

    let progress = 0;

    let interval = setInterval(()=>{
        progress++;

        bar.style.width = progress + "%";
        status.innerText = progress + "%";

        if(progress >= 100){
            clearInterval(interval);
            status.innerText = "Abrindo Free Fire...";

            setTimeout(()=>{
                window.location.href = "intent://#Intent;package=com.dts.freefireth;end";
            }, 800);
        }

    }, 30);
}

// matrix
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = [];
for(let i = 0; i < columns; i++){
    drops[i] = 1;
}

function draw(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px Arial";

    for(let i = 0; i < drops.length; i++){
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
